name: Daily Health Check

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write           # To commit reports back

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mongo:
        image: mongo:7
        ports:
          - 27019:27017
        # No auth for tests (matches cargo test expectations)

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ROOMLER__DATABASE__URL: mongodb://localhost:27019
      ROOMLER__DATABASE__NAME: roomler2_health_check
      ROOMLER__REDIS__URL: redis://localhost:6379

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 20
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: gjovanov/roomler-ai-deploy
          path: ../roomler-ai-deploy
          token: ${{ secrets.GH_PAT }}
        continue-on-error: true

      - name: Install system dependencies (mediasoup build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake python3-pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo tools
        run: |
          cargo install cargo-audit || true
          cargo install cargo-outdated || true

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install UI dependencies
        run: cd ui && bun install --frozen-lockfile

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Wait for MongoDB
        run: |
          for i in $(seq 1 30); do
            if mongosh --host localhost --port 27019 --eval "db.runCommand({ping:1})" --quiet 2>/dev/null; then
              echo "MongoDB ready"
              break
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 2
          done

      - name: Create reports directory
        run: mkdir -p .claude/reports

      - name: Run daily health check
        run: |
          claude --dangerously-skip-permissions \
            -p "$(cat .claude/daily-health-check-prompt.md)" \
            --output-format text \
            --max-turns 50 \
            2>&1 | tee health-check-output.txt
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit documentation updates
        uses: stefanzweifel/git-auto-commit-action@v5
        if: always()
        with:
          commit_message: "docs(claude): health-check report [automated]"
          file_pattern: "CLAUDE.md .claude/reports/*.md .claude/skills/*.md"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: health-check-report-${{ github.run_id }}
          path: health-check-output.txt
          retention-days: 90

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Daily health check FAILED — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
