name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        # Pin bun to match local reproducible builds; setup-bun@v2 with
        # no version input resolves to `latest`, which has silently
        # shipped regressions that broke `vue-tsc --noEmit` for us in
        # the past. Local 1.3.12 on Windows + Linux (WSL) passes, so
        # we pin there and bump intentionally.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          # `ui/bun.lock` is the text-format lockfile bun 1.2+ writes.
          # The older `bun.lockb` binary format isn't produced by our
          # installs, so the previous key hashed a non-existent file
          # (always the empty-string hash) and the cache never varied.
          key: ${{ runner.os }}-bun-${{ hashFiles('ui/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        # `--frozen-lockfile` fails the build if bun.lock is missing
        # or stale. Without it the resolver silently up-versions
        # transitive deps between runs, which is how the CI frontend
        # build started diverging from local.
        run: cd ui && bun install --frozen-lockfile

      - name: Build (includes vue-tsc --noEmit)
        # Disable the runner's default `-e` / pipefail so we can capture
        # PIPESTATUS and decide the exit code ourselves. With -e active
        # the tee-pipe's non-zero would kill the shell before we even
        # got to write the captured output to $GITHUB_STEP_SUMMARY —
        # which is what happened on the previous attempt (step ran for
        # 19s and produced no summary).
        shell: bash --noprofile --norc {0}
        run: |
          cd ui
          {
            echo "### bun version"
            bun --version
          } >> "$GITHUB_STEP_SUMMARY"

          echo "### vue-tsc --noEmit" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bun x vue-tsc --noEmit 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          tsc_rc=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ "$tsc_rc" != 0 ]; then
            echo "vue-tsc failed with exit $tsc_rc" >> "$GITHUB_STEP_SUMMARY"
            exit "$tsc_rc"
          fi

          echo "### vite build" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bun x vite build 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          vite_rc=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ "$vite_rc" != 0 ]; then
            echo "vite build failed with exit $vite_rc" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$vite_rc"

      - name: Run unit tests
        run: cd ui && bun run test:unit
