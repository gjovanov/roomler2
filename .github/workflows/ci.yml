name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Pinned to the version in rust-toolchain.toml so local dev
        # and CI reject the same lints. Bump both in one commit
        # when upgrading.
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      # Phase Y feature gate. The `vp9-444` feature compiles libvpx
      # via `env-libvpx-sys` (needs pkg-config + libvpx system lib),
      # plus `dcv-color-primitives`. Default workspace clippy never
      # exercises this path because the feature is opt-in. Catch
      # breakage here so the standard release lane (which is still
      # `--features full`, no vp9-444 yet) doesn't ship a regression
      # latent under the feature flag — and so the `bun run e2e`
      # VP9-444 spec doesn't drift away from the agent it's testing.
      - name: Install libvpx (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y libvpx-dev pkg-config \
            libxcb1-dev libxcb-shm0-dev libxcb-randr0-dev \
            cmake libclang-dev

      - name: Check agent --features vp9-444
        run: cargo check -p roomler-agent --features vp9-444

      - name: Test agent wire format + libvpx round-trip under vp9-444
        # Runs the 3 video_bytes wire-format tests (lock byte
        # layout against the worker parser) plus the libvpx encoder
        # tests (first_frame_is_keyframe + rejects_odd_dims) which
        # only compile under this feature. Together: end-to-end
        # confidence that bytes encoded on the agent will parse
        # correctly on the browser.
        run: cargo test -p roomler-agent --features vp9-444 --lib -- video_bytes_wire libvpx

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        # Pin bun to match local reproducible builds; setup-bun@v2 with
        # no version input resolves to `latest`, which has silently
        # shipped regressions that broke `vue-tsc --noEmit` for us in
        # the past. Local 1.3.12 on Windows + Linux (WSL) passes, so
        # we pin there and bump intentionally.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          # `ui/bun.lock` is the text-format lockfile bun 1.2+ writes.
          # The older `bun.lockb` binary format isn't produced by our
          # installs, so the previous key hashed a non-existent file
          # (always the empty-string hash) and the cache never varied.
          key: ${{ runner.os }}-bun-${{ hashFiles('ui/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        # `--frozen-lockfile` fails the build if bun.lock is missing
        # or stale. Without it the resolver silently up-versions
        # transitive deps between runs, which is how the CI frontend
        # build started diverging from local.
        run: cd ui && bun install --frozen-lockfile

      - name: Build (includes vue-tsc --noEmit)
        # Override the default runner shell to drop -e/pipefail so we
        # can capture exit codes and always flush output, and emit the
        # last 30 lines as ::error:: annotations so the failure mode
        # is visible via the anonymous GitHub API (annotations endpoint
        # is publicly readable for public repos; step summaries and
        # raw logs are not without auth).
        shell: bash --noprofile --norc {0}
        run: |
          cd ui
          echo "bun $(bun --version)"

          echo "::group::vue-tsc --noEmit"
          bun x vue-tsc --noEmit 2>&1 | tee /tmp/vue-tsc.log
          tsc_rc=${PIPESTATUS[0]}
          echo "::endgroup::"
          if [ "$tsc_rc" != 0 ]; then
            {
              echo "### vue-tsc --noEmit (exit $tsc_rc)"
              echo '```'
              cat /tmp/vue-tsc.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            # Emit last 30 lines of tsc output as a single error
            # annotation. %0A escapes newlines per GHA workflow command
            # grammar so the annotation preserves multi-line output.
            tail -30 /tmp/vue-tsc.log | awk 'BEGIN{ORS="%0A"}{print}' | sed 's/^/::error::vue-tsc: /'
            exit "$tsc_rc"
          fi

          echo "::group::vite build"
          bun x vite build 2>&1 | tee /tmp/vite.log
          vite_rc=${PIPESTATUS[0]}
          echo "::endgroup::"
          if [ "$vite_rc" != 0 ]; then
            {
              echo "### vite build (exit $vite_rc)"
              echo '```'
              cat /tmp/vite.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            tail -30 /tmp/vite.log | awk 'BEGIN{ORS="%0A"}{print}' | sed 's/^/::error::vite: /'
          fi
          exit "$vite_rc"

      - name: Run unit tests
        run: cd ui && bun run test:unit
